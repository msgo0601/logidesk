
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LogiDesk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;height:100vh;display:flex;flex-direction:row;overflow:hidden;background:#f0f2f5}
/* 사이드 네비 */
.nav{width:200px;background:#1b2333;display:flex;flex-direction:column;flex-shrink:0}
.nav-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07)}
.lm{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.5px}
.lm span{color:#2563eb}
.ls{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.ns{font-size:9px;color:rgba(255,255,255,0.28);letter-spacing:1.5px;text-transform:uppercase;padding:16px 16px 5px}
.ni{display:flex;align-items:center;gap:9px;padding:10px 16px;color:rgba(255,255,255,0.55);cursor:pointer;transition:all .15s;font-size:12.5px;border-left:3px solid transparent;user-select:none}
.ni:hover{background:#2a3650;color:#fff}
.ni.active{background:rgba(37,99,235,0.2);color:#fff;border-left-color:#2563eb}
.ni .ic{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.nav-foot{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,0.07)}
.nav-foot span{font-size:10px;color:rgba(255,255,255,0.2)}
/* 메인 영역 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 22px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar .pt{font-size:14px;font-weight:700;color:#1a1a2e}
.topbar .bc{font-size:11px;color:#94a3b8}
/* 콘텐츠 + CBM 가로 배치 */
.mid{flex:1;display:flex;flex-direction:row;overflow:hidden}
/* 페이지 */
.pages{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.pg{display:none;flex:1;overflow:hidden;flex-direction:column}
.pg.active{display:flex}
.pg iframe{flex:1;border:none;width:100%;height:100%}
/* 홈 */
.home{flex:1;overflow-y:auto;padding:28px 32px}
.home-title{font-size:21px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.home-sub{font-size:13px;color:#64748b;margin-bottom:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px 18px 18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#2563eb;opacity:0;transition:.15s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08);border-color:#bfdbfe}
.card:hover::before{opacity:1}
.card-ic{font-size:26px;margin-bottom:10px}
.card-tt{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:4px}
.card-dc{font-size:11px;color:#94a3b8;line-height:1.55}
.card-ar{position:absolute;bottom:14px;right:14px;font-size:15px;color:#cbd5e1;transition:.15s}
.card:hover .card-ar{color:#2563eb;transform:translateX(3px)}
/* CBM 패널 */
.cbm-panel{width:295px;flex-shrink:0;background:#1b2333;border-left:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column}
.cbm-hdr{padding:14px 16px 11px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between}
.cbm-hdr .ht{font-size:13px;font-weight:700;color:#fff}
.cbm-badge{font-size:9px;background:rgba(37,99,235,0.32);color:#93c5fd;padding:2px 8px;border-radius:20px}
.cbm-body{flex:1;overflow-y:auto;padding:14px}
.cbm-inputs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.cbm-grp{display:flex;flex-direction:column;gap:3px}
.cbm-grp label{font-size:9px;color:rgba(255,255,255,0.35);text-align:center;font-weight:700}
.ci{width:100%;padding:8px 2px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;font-size:11px;text-align:center;background:rgba(255,255,255,0.07);color:#fff}
.ci:focus{border-color:#2563eb;outline:none;background:rgba(37,99,235,0.12)}
.ci::placeholder{color:rgba(255,255,255,0.18)}
.cbm-tbl-wrap{border:1px solid rgba(255,255,255,0.08);border-radius:7px;max-height:195px;overflow-y:auto;margin-top:6px}
.cbm-tbl-wrap::-webkit-scrollbar{width:3px}
.cbm-tbl-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
.ctbl{width:100%;border-collapse:collapse;font-size:10.5px}
.ctbl th{padding:6px 4px;color:rgba(255,255,255,0.28);font-weight:500;font-size:9px;background:rgba(0,0,0,0.22);text-align:center;position:sticky;top:0}
.ctbl td{padding:8px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.75)}
.dl{color:#ef4444;cursor:pointer;font-size:13px}.dl:hover{color:#fca5a5}
.cbm-sum{background:rgba(37,99,235,0.13);border:1px solid rgba(37,99,235,0.28);border-radius:9px;margin-top:10px;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.si{text-align:center}
.sl{font-size:9px;color:rgba(255,255,255,0.35);display:block;margin-bottom:3px}
.sv{font-size:20px;font-weight:800;color:#22c55e}
.cbm-clr{width:100%;margin-top:9px;padding:9px;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.12);color:#fca5a5;border-radius:6px;font-weight:700;cursor:pointer;font-size:11px;font-family:inherit}
.cbm-clr:hover{background:rgba(239,68,68,0.24);color:#fff}
</style>
</head>
<body>

<!-- 사이드 네비 -->
<nav class="nav">
  <div class="nav-logo">
    <div class="lm">⚓ Logi<span>Desk</span></div>
    <div class="ls">Freight Tools</div>
  </div>
  <div class="ns">메뉴</div>
  <div class="ni active" onclick="go('home',this)"><span class="ic">🏠</span>홈</div>
  <div class="ns">계산기</div>
  <div class="ni" onclick="go('aus',this)"><span class="ic">🇦🇺</span>호주 도착지 비용</div>
  <div class="ni" onclick="go('inc',this)"><span class="ic">💹</span>선사운임 &amp; 인센티브</div>
  <div class="nav-foot"><span>LogiDesk v2.0</span></div>
</nav>

<!-- 메인 -->
<div class="main">
  <div class="topbar">
    <div class="pt" id="PT">홈</div>
    <div class="bc" id="BC">LogiDesk · 대시보드</div>
  </div>
  <div class="mid">

    <!-- 페이지들 -->
    <div class="pages">

      <!-- 홈 -->
      <div id="pg-home" class="pg active">
        <div class="home">
          <div class="home-title">안녕하세요 👋</div>
          <div class="home-sub">업무에 필요한 도구를 바로 사용하세요.</div>
          <div class="cards">
            <div class="card" onclick="go('aus',null)">
              <div class="card-ic">🇦🇺</div>
              <div class="card-tt">호주 도착지 비용</div>
              <div class="card-dc">Melbourne / Sydney / Brisbane<br>Co-loader · Direct 차액 계산</div>
              <div class="card-ar">→</div>
            </div>
            <div class="card" onclick="go('inc',null)">
              <div class="card-ic">💹</div>
              <div class="card-tt">선사운임 &amp; 인센티브</div>
              <div class="card-dc">운임 &amp; 인센티브 관리<br>기간별 비교 / 편집</div>
              <div class="card-ar">→</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 호주 -->
      <div id="pg-aus" class="pg">
        <iframe id="fr-aus" src=""></iframe>
      </div>

      <!-- 인센티브 -->
      <div id="pg-inc" class="pg">
        <iframe id="fr-inc" src=""></iframe>
      </div>

    </div><!-- /pages -->

    <!-- CBM 패널 -->
    <div class="cbm-panel">
      <div class="cbm-hdr">
        <div class="ht">📦 CBM 계산기</div>
        <span class="cbm-badge">상시 고정</span>
      </div>
      <div class="cbm-body">
        <div class="cbm-inputs">
          <div class="cbm-grp"><label>가로(W)</label><input class="ci" type="number" id="cw" placeholder="cm" onkeydown="ke(event,'cl')"></div>
          <div class="cbm-grp"><label>세로(L)</label><input class="ci" type="number" id="cl" placeholder="cm" onkeydown="ke(event,'ch')"></div>
          <div class="cbm-grp"><label>높이(H)</label><input class="ci" type="number" id="ch" placeholder="cm" onkeydown="ke(event,'cp')"></div>
          <div class="cbm-grp"><label>수량</label><input class="ci" type="number" id="cp" placeholder="EA" onkeydown="ke(event,'ADD')"></div>
        </div>
        <div class="cbm-tbl-wrap">
          <table class="ctbl">
            <thead><tr><th>치수</th><th>수량</th><th>CBM</th><th>×</th></tr></thead>
            <tbody id="cbm-bd"></tbody>
          </table>
        </div>
        <div class="cbm-sum">
          <div class="si"><span class="sl">TOTAL PKG</span><span class="sv" id="cbm-pk">0</span></div>
          <div class="si"><span class="sl">TOTAL CBM</span><span class="sv" id="cbm-cb">0.000</span></div>
        </div>
        <button class="cbm-clr" onclick="cc()">전체 지우기</button>
      </div>
    </div><!-- /cbm-panel -->

  </div><!-- /mid -->
</div><!-- /main -->

const FRAMES={
  aus:{id:'fr-aus',b64:AUS_B64,loaded:false},
  inc:{id:'fr-inc',b64:INC_B64,loaded:false}
};
const TITLES={
  home:{t:'홈',b:'LogiDesk · 대시보드'},
  aus:{t:'호주 도착지 비용',b:'LogiDesk · 계산기'},
  inc:{t:'선사운임 & 인센티브',b:'LogiDesk · 운임관리'}
};

function go(key,navEl){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  if(navEl){
    navEl.classList.add('active');
  } else {
    document.querySelectorAll('.ni').forEach(n=>{
      if(n.getAttribute('onclick') && n.getAttribute('onclick').includes("'"+key+"'")) n.classList.add('active');
    });
  }
  document.getElementById('pg-'+key).classList.add('active');
  document.getElementById('PT').textContent=TITLES[key].t;
  document.getElementById('BC').textContent=TITLES[key].b;
  if(FRAMES[key]&&!FRAMES[key].loaded){
    const bin=atob(FRAMES[key].b64),bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    document.getElementById(FRAMES[key].id).src=URL.createObjectURL(new Blob([bytes],{type:'text/html;charset=utf-8'}));
    FRAMES[key].loaded=true;
  }
}

let items=[];
function ke(ev,nxt){if(ev.key!=='Enter')return;ev.preventDefault();nxt==='ADD'?add():document.getElementById(nxt).focus();}
function add(){
  const w=document.getElementById('cw'),l=document.getElementById('cl'),h=document.getElementById('ch'),p=document.getElementById('cp');
  if(!w.value||!l.value||!h.value||!p.value)return;
  const cbm=(parseFloat(w.value)/100)*(parseFloat(l.value)/100)*(parseFloat(h.value)/100)*parseInt(p.value);
  items.push({spec:w.value+'x'+l.value+'x'+h.value,pkg:parseInt(p.value),cbm});
  render();w.value='';l.value='';h.value='';p.value='';w.focus();
}
function render(){
  let tP=0,tC=0;
  document.getElementById('cbm-bd').innerHTML=items.map((it,i)=>{
    tP+=it.pkg;tC+=it.cbm;
    return '<tr><td style="font-size:9.5px">'+it.spec+'</td><td>'+it.pkg+'</td><td>'+it.cbm.toFixed(3)+'</td><td class="dl" onclick="dl('+i+')">x</td></tr>';
  }).join('');
  document.getElementById('cbm-pk').textContent=tP.toLocaleString();
  document.getElementById('cbm-cb').textContent=tC.toFixed(3);
}
function dl(i){items.splice(i,1);render();}
function cc(){items=[];render();document.getElementById('cw').focus();}
</script>
